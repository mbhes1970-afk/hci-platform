<style>
/* ═══════════════════════════════════════════════════════════════
   HCI — ICP1: EU MARKET ENTRY
   All content loaded dynamically from window.SITE
   Design system: Dark premium consultancy
   ICP1 accent: #6C5CE7 (purple)
   ═══════════════════════════════════════════════════════════════ */

:root {
  /* Brand */
  --gold: #c8a55a;
  --gold-light: #e0c882;
  --gold-dim: rgba(200,165,90,.12);
  --gold-border: rgba(200,165,90,.25);

  /* ICP1 accent */
  --accent: #6C5CE7;
  --accent-light: #a29bfe;
  --accent-dim: rgba(108,92,231,.12);
  --accent-border: rgba(108,92,231,.3);

  /* Surface */
  --bg-deep: #08090c;
  --bg: #0d0f14;
  --bg-card: #13151c;
  --bg-elevated: #1c1e28;
  --border: rgba(255,255,255,.06);
  --border-hover: rgba(255,255,255,.12);

  /* Text */
  --text: #a8a6b4;
  --text-dim: #5e5d6a;
  --text-bright: #f0eef5;
  --white: #ffffff;

  /* Status */
  --success: #4ade80;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  font-family: 'Outfit', sans-serif;
  background: var(--bg-deep);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  line-height: 1.7;
  overflow-x: hidden;
}

/* ═══ AMBIENT BACKGROUND ═══ */
.ambient {
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background:
    radial-gradient(ellipse 800px 600px at 20% 20%, rgba(108,92,231,.05) 0%, transparent 70%),
    radial-gradient(ellipse 600px 800px at 80% 80%, rgba(200,165,90,.03) 0%, transparent 70%);
}
.grain {
  position: fixed; inset: 0; pointer-events: none; z-index: 999; opacity: .02;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='g'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.75' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23g)'/%3E%3C/svg%3E");
}

/* ═══ SHARED ═══ */
.container { max-width: 1200px; margin: 0 auto; padding: 0 40px; position: relative; z-index: 10; }
section { padding: 120px 0; position: relative; }
.section-border { border-top: 1px solid var(--border); }

.section-eyebrow {
  font-family: 'Geist Mono', monospace;
  font-size: 11px; color: var(--accent);
  text-transform: uppercase; letter-spacing: 2px; margin-bottom: 16px;
}
.section-title {
  font-family: 'Instrument Serif', serif;
  font-size: clamp(28px, 4vw, 48px);
  font-weight: 400; color: var(--white); line-height: 1.15; margin-bottom: 16px;
}
.section-title em {
  font-style: italic;
  background: linear-gradient(135deg, var(--gold), var(--gold-light));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.section-sub {
  font-size: 16px; color: var(--text); line-height: 1.8;
  max-width: 620px; margin-bottom: 56px;
}

/* ═══ BUTTONS ═══ */
.btn-primary {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 14px 32px; border-radius: 8px;
  font-size: 14px; font-weight: 600; text-decoration: none;
  background: linear-gradient(135deg, var(--gold), #d4b45e);
  color: var(--bg-deep); transition: all .3s; letter-spacing: .3px;
}
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(200,165,90,.25); }
.btn-ghost {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 14px 28px; border-radius: 8px;
  font-size: 14px; font-weight: 500; text-decoration: none;
  color: var(--text); border: 1px solid var(--border); transition: all .2s;
}
.btn-ghost:hover { border-color: var(--gold-border); color: var(--gold); }

/* ═══ S01: HERO ═══ */
.hero {
  min-height: 100vh; display: flex; flex-direction: column;
  justify-content: center; padding: 120px 0 80px;
}
.hero-inner { max-width: 780px; }
.hero-kicker {
  font-family: 'Geist Mono', monospace;
  font-size: 11px; color: var(--accent);
  text-transform: uppercase; letter-spacing: 2.5px;
  margin-bottom: 24px;
}
.hero h1 {
  font-family: 'Instrument Serif', serif;
  font-size: clamp(36px, 5.5vw, 64px);
  font-weight: 400; line-height: 1.08; color: var(--white); margin-bottom: 12px;
}
.hero h1 em {
  font-style: italic;
  background: linear-gradient(135deg, var(--gold), var(--gold-light));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.hero-sub {
  font-size: 17px; line-height: 1.8; color: var(--text);
  max-width: 560px; margin-bottom: 32px;
}
.hero-chips {
  display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 40px;
}
.hero-chip {
  font-family: 'Geist Mono', monospace; font-size: 11px;
  padding: 6px 14px; border-radius: 20px;
  background: var(--accent-dim); color: var(--accent);
  border: 1px solid var(--accent-border); letter-spacing: .5px;
}
.hero-actions { display: flex; gap: 16px; flex-wrap: wrap; align-items: center; }

/* ═══ S02: PROBLEM ═══ */
.problem-grid {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px;
}
.problem-card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 14px; padding: 32px 24px; transition: all .3s;
  position: relative; overflow: hidden;
}
.problem-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0;
  height: 3px; background: var(--accent); opacity: .4;
}
.problem-card:hover { border-color: var(--border-hover); transform: translateY(-2px); }
.problem-icon {
  width: 44px; height: 44px; border-radius: 10px;
  background: var(--accent-dim); border: 1px solid var(--accent-border);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; margin-bottom: 20px;
}
.problem-card p {
  font-size: 14px; color: var(--text); line-height: 1.7;
}

/* ═══ S03: APPROACH / STEPS ═══ */
.steps-grid {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px;
}
.step-card {
  background: var(--bg-card); padding: 36px 28px;
  position: relative; transition: all .3s;
}
.step-card:first-child { border-radius: 14px 0 0 14px; }
.step-card:last-child { border-radius: 0 14px 14px 0; }
.step-card:hover { background: var(--bg-elevated); }
.step-num {
  font-family: 'Geist Mono', monospace; font-size: 10px;
  color: var(--accent); letter-spacing: 1px; margin-bottom: 14px;
}
.step-card h4 {
  font-family: 'Instrument Serif', serif; font-size: 22px;
  font-weight: 400; color: var(--white); margin-bottom: 10px;
}
.step-card p { font-size: 13px; color: var(--text-dim); line-height: 1.7; }

/* ═══ STORYTELLING SECTIONS ═══ */
.story-section { padding: 100px 0; }
.story-section .container { max-width: 800px; }
.story-num {
  font-family: 'Geist Mono', monospace; font-size: 10px;
  color: var(--accent); letter-spacing: 2px; text-transform: uppercase;
  margin-bottom: 12px;
}
.story-title {
  font-family: 'Instrument Serif', serif;
  font-size: clamp(24px, 3.5vw, 38px); font-weight: 400;
  color: var(--white); line-height: 1.2; margin-bottom: 20px;
}
.story-title em {
  font-style: italic;
  background: linear-gradient(135deg, var(--gold), var(--gold-light));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.story-body { font-size: 15px; color: var(--text); line-height: 1.85; max-width: 680px; }
.story-body strong { color: var(--text-bright); font-weight: 600; }

.story-quote {
  margin: 28px 0; padding: 20px 24px;
  border-left: 3px solid var(--accent); background: var(--accent-dim);
  border-radius: 0 10px 10px 0; font-size: 14px; font-style: italic;
  color: var(--text-bright); line-height: 1.7;
}

/* Quick Qualifier */
.qualifier-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
  margin-top: 28px;
}
.qualifier-item {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 10px; padding: 16px 20px; font-size: 14px;
  color: var(--text); line-height: 1.6; display: flex; gap: 10px; align-items: flex-start;
  transition: border-color .2s;
}
.qualifier-item:hover { border-color: var(--accent-border); }
.qualifier-check { color: var(--accent); font-size: 16px; flex-shrink: 0; margin-top: 2px; }
.qualifier-note {
  margin-top: 20px; font-size: 13px; color: var(--text-dim);
  font-family: 'Geist Mono', monospace; letter-spacing: .3px;
}

/* Tool-keuze menu */
.toolmenu-section { padding: 100px 0; }
.toolmenu-grid {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px;
  margin-top: 40px;
}
.toolmenu-card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 14px; padding: 28px 24px; text-decoration: none;
  transition: all .3s; display: block; position: relative; overflow: hidden;
}
.toolmenu-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0;
  height: 2px; background: var(--accent); opacity: 0; transition: opacity .3s;
}
.toolmenu-card:hover { border-color: var(--accent-border); transform: translateY(-3px); }
.toolmenu-card:hover::before { opacity: 1; }
.toolmenu-icon {
  font-size: 24px; margin-bottom: 14px;
}
.toolmenu-label {
  font-size: 15px; font-weight: 600; color: var(--white); margin-bottom: 6px;
}
.toolmenu-desc {
  font-size: 12px; color: var(--text-dim); line-height: 1.6;
}
.toolmenu-badge {
  display: inline-block; margin-top: 10px; font-size: 10px; font-family: 'Geist Mono', monospace;
  padding: 3px 8px; border-radius: 4px; letter-spacing: .5px;
}
.toolmenu-badge.free { background: rgba(74,222,128,.1); color: var(--success); border: 1px solid rgba(74,222,128,.2); }
.toolmenu-badge.locked { background: var(--gold-dim); color: var(--gold); border: 1px solid var(--gold-border); }

@media (max-width: 900px) {
  .qualifier-grid { grid-template-columns: 1fr; }
  .toolmenu-grid { grid-template-columns: 1fr; }
}

/* ═══ S04: ASSESSMENT CTA ═══ */
.assessment-cta-wrap {
  background: var(--bg-card); border: 1px solid var(--accent-border);
  border-radius: 16px; padding: 56px 48px; text-align: center;
  position: relative; overflow: hidden;
}
.assessment-cta-wrap::before {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(ellipse 600px 300px at 50% 0%, rgba(108,92,231,.08) 0%, transparent 70%);
  pointer-events: none;
}
.assessment-cta-wrap h3 {
  font-family: 'Instrument Serif', serif; font-size: clamp(24px, 3vw, 36px);
  font-weight: 400; color: var(--white); margin-bottom: 16px;
  position: relative;
}
.assessment-cta-wrap h3 em {
  font-style: italic;
  background: linear-gradient(135deg, var(--gold), var(--gold-light));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.assessment-desc {
  font-size: 15px; color: var(--text); max-width: 520px;
  margin: 0 auto 32px; line-height: 1.7; position: relative;
}
.assessment-cta-wrap .btn-primary { position: relative; }

/* ═══ S05: MIKE HES ═══ */
.mike-section {
  border-top: 1px solid var(--border);
  padding-bottom: 80px;
}
.mike-grid {
  display: grid; grid-template-columns: auto 1fr;
  gap: 56px; align-items: center;
}
.mike-photo-wrap {
  position: relative; max-width: 320px;
}
.mike-photo {
  width: 280px; aspect-ratio: 1/1;
  border-radius: 16px; border: 1px solid var(--border);
  overflow: hidden;
}
.mike-photo img { width: 100%; height: 100%; object-fit: cover; }
.mike-cred {
  position: absolute; bottom: -16px; left: 24px;
  background: var(--gold); color: var(--bg-deep);
  padding: 12px 20px; border-radius: 8px;
  display: flex; align-items: center; gap: 12px;
}
.mike-cred-num {
  font-family: 'Instrument Serif', serif;
  font-size: 28px; font-weight: 400;
}
.mike-cred-label {
  font-size: 11px; font-weight: 600;
  line-height: 1.3; letter-spacing: .3px;
}
.mike-content h2 {
  font-family: 'Instrument Serif', serif;
  font-size: clamp(28px, 3.5vw, 42px);
  font-weight: 400; color: var(--white);
  line-height: 1.15; margin-bottom: 20px;
}
.mike-content h2 em { font-style: italic; color: var(--gold); }
.mike-bio {
  font-size: 15px; color: var(--text);
  line-height: 1.8; margin-bottom: 32px;
}
.mike-title {
  font-family: 'Geist Mono', monospace; font-size: 11px;
  color: var(--text-dim); text-transform: uppercase;
  letter-spacing: 1.5px; margin-bottom: 12px;
}
.mike-actions { display: flex; gap: 16px; flex-wrap: wrap; }

/* ═══ S06: BOTTOM CTA ═══ */
.bottom-cta {
  border-top: 1px solid var(--border);
  text-align: center;
}
.bottom-cta h2 {
  font-family: 'Instrument Serif', serif;
  font-size: clamp(28px, 4vw, 48px);
  font-weight: 400; color: var(--white);
  line-height: 1.15; margin-bottom: 16px;
}
.bottom-cta h2 em {
  font-style: italic;
  background: linear-gradient(135deg, var(--gold), var(--gold-light));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.bottom-cta-sub {
  font-size: 16px; color: var(--text); line-height: 1.8;
  max-width: 520px; margin: 0 auto 40px;
}
.bottom-cta-actions {
  display: flex; gap: 16px; justify-content: center; flex-wrap: wrap;
}

/* ═══ ANIMATIONS ═══ */
.fade-up {
  opacity: 0; transform: translateY(24px);
  transition: opacity .6s ease, transform .6s ease;
}
.fade-up.visible { opacity: 1; transform: translateY(0); }
.stagger-1 { transition-delay: .1s; }
.stagger-2 { transition-delay: .2s; }
.stagger-3 { transition-delay: .3s; }

/* ═══ MOBILE ═══ */
@media (max-width: 900px) {
  .container { padding: 0 20px; }
  section { padding: 80px 0; }

  .hero { padding: 100px 0 60px; min-height: auto; }
  .hero h1 { font-size: 32px; }

  .problem-grid { grid-template-columns: 1fr; }

  .steps-grid { grid-template-columns: 1fr; gap: 0; }
  .step-card:first-child { border-radius: 14px 14px 0 0; }
  .step-card:last-child { border-radius: 0 0 14px 14px; }

  .assessment-cta-wrap { padding: 40px 24px; }

  .mike-grid { grid-template-columns: 1fr; gap: 40px; }
  .mike-photo-wrap { max-width: 280px; }
}

@media (max-width: 600px) {
  .hero-chips { gap: 6px; }
  .hero-chip { font-size: 10px; padding: 5px 10px; }
  .mike-photo { width: 220px; }
}
</style>
</head>
<body>

<div class="ambient"></div>
<div class="grain"></div>

  <div class="container">

  <div class="container">
    <div class="story-num fade-up" id="story2-num" data-animate="fade" data-delay="0"></div>
    <h2 class="story-title fade-up" id="story2-title" data-animate="fade" data-delay="100"></h2>
    <div class="story-body fade-up" id="story2-body" data-animate="fade" data-delay="200"></div>

  <div class="container">
    <div class="story-num fade-up" id="story3-num" data-animate="fade" data-delay="0"></div>

    <h2 class="story-title fade-up" id="story4-title" data-animate="fade" data-delay="100"></h2>

  <div class="container">

    <div class="toolmenu-grid hci-stagger" id="toolmenu-grid"></div>

<!-- ════════════════════════════════════════════════════════════

  <div class="container">

  </div>

<!-- ════════════════════════════════════════════════════════════
     S05: MIKE HES
     ════════════════════════════════════════════════════════════ -->
<section class="mike-section" id="mike">
  <div class="container">
    <div class="mike-grid">
      <div class="mike-photo-wrap fade-up">
        <div class="mike-photo"><img id="mike-photo" src="" alt=""></div>
        <div class="mike-cred">
          <div class="mike-cred-num" id="mike-years"></div>
          <div class="mike-cred-label" id="mike-years-label"></div>
        </div>
      </div>
      <div class="mike-content fade-up stagger-2">

      { icon: '📊', label_nl: 'EU Readiness Quickscan', label_en: 'EU Readiness Quickscan', desc_nl: 'Gratis assessment in 7 min. Direct inzicht.', desc_en: 'Free assessment in 7 min. Instant insight.', href: S.tools.quickscan + '?icp=icp1', free: true },

    // ── S05: MIKE HES ──

      var bCta = lang === 'en' ? icp.cta_en : icp.cta_nl;
      var bSec = lang === 'en' ? mike.cta_en : mike.cta_nl;

        '<a href="' + brand.calendly + '" class="btn-ghost">' + bSec + '</a>';
    }

    // Re-observe fade-up elements after render
    initObserver();
  }

  // ── IntersectionObserver for .fade-up ──
  var observer;
  function initObserver() {
    if (!observer) {
      observer = new IntersectionObserver(function(entries) {
        entries.forEach(function(entry) {
          if (entry.isIntersecting) {
            entry.target.classList.add('visible');
            observer.unobserve(entry.target);
          }
        });
      }, { threshold: 0.15, rootMargin: '0px 0px -40px 0px' });
    }
    document.querySelectorAll('.fade-up:not(.visible)').forEach(function(el) {
      observer.observe(el);
    });
  }

  // ── Language switch hook ──
  window.onLangChange = renderPage;

  // ── Init ──
  document.addEventListener('DOMContentLoaded', function() {
    renderPage();
  });
})();
