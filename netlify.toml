# ============================================================
# HCI NETLIFY CONFIGURATION
# netlify.toml
#
# HES Consultancy International
# hes-consultancy-international.com
# ============================================================

[build]
  publish   = "."
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "18"

# ── API proxy redirect ────────────────────────────────────
# Browser calls /api/claude → Netlify Function (key stays hidden)
# Browser calls /api/slack  → Same function, Slack alert
[[redirects]]
  from   = "/api/claude"
  to     = "/.netlify/functions/claude-proxy"
  status = 200

[[redirects]]
  from   = "/api/slack"
  to     = "/.netlify/functions/claude-proxy"
  status = 200

# ── SPA fallback ──────────────────────────────────────────
# All other routes → index.html (enables client-side routing)
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# ── Security headers ─────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "camera=(), microphone=(), geolocation=()"

# ── Cache: static assets ─────────────────────────────────
[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── No cache: HTML pages (always fresh) ──────────────────
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
