<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pagina niet gevonden — HES Consultancy International</title>
<style>
:root{--bg:#08090c;--card:#13151c;--gold:#c8a55a;--text:#a8a6b4;--text-dim:#5e5d6a;--white:#fff;--border:rgba(255,255,255,.06)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center}
.card{max-width:520px;width:90%;padding:48px}
.code{font-size:72px;font-weight:200;color:var(--gold);margin-bottom:16px;letter-spacing:-2px}
h1{font-size:24px;color:var(--white);font-weight:400;margin-bottom:12px}
p{font-size:14px;color:var(--text-dim);line-height:1.7;margin-bottom:28px}
.links{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.links a{padding:10px 20px;border-radius:8px;font-size:13px;font-weight:600;text-decoration:none;transition:all .2s}
.btn-primary{background:var(--gold);color:var(--bg)}
.btn-primary:hover{background:#d4b366}
.btn-ghost{border:1px solid var(--border);color:var(--text)}
.btn-ghost:hover{border-color:var(--gold);color:var(--gold)}
.lang-toggle { font-size: 11px; letter-spacing: 0.1em; color: var(--text-dim, #888880); cursor: pointer; display: flex; gap: 6px; align-items: center; }
.lang-toggle span.active { color: var(--gold, #C9A84C); }
</style>
</head>
<body>
<div class="card">
  <div style="display:flex;justify-content:flex-end;margin-bottom:16px">
    <div class="lang-toggle" id="lang-toggle">
      <span data-lang="nl" class="active">NL</span>
      <span style="opacity:0.3">|</span>
      <span data-lang="en">EN</span>
    </div>
  </div>
  <div class="code">404</div>
  <h1 data-nl="Pagina niet gevonden" data-en="Page not found">Pagina niet gevonden</h1>
  <p data-nl="De pagina die u zoekt bestaat niet of is verplaatst. Gebruik de links hieronder om verder te navigeren." data-en="The page you are looking for does not exist or has been moved. Use the links below to navigate further.">De pagina die u zoekt bestaat niet of is verplaatst. Gebruik de links hieronder om verder te navigeren.</p>
  <div class="links">
    <a href="/" class="btn-primary">Homepage</a>
    <a href="/insights" class="btn-ghost">Insights</a>
    <a href="/modules" class="btn-ghost">Platform</a>
  </div>
</div>
<script src="/js/lang-toggle.js"></script>
</body>
</html>
