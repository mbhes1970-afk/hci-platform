<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Confirm Email — HES Consultancy International</title>
<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
<style>
:root{--bg:#08090c;--card:#13151c;--gold:#c8a55a;--text:#c8c6d4;--text-dim:#6e6d7a;--white:#fff;--border:rgba(255,255,255,.06)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:48px;max-width:440px;width:90%;text-align:center}
.mark{width:56px;height:56px;border:2px solid var(--gold);border-radius:10px;display:inline-flex;align-items:center;justify-content:center;font-size:16px;font-weight:600;color:var(--gold);margin-bottom:20px}
h1{font-size:24px;color:var(--white);margin-bottom:8px}
p{font-size:14px;color:var(--text-dim);line-height:1.6;margin-bottom:20px}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin 1s linear infinite;margin:20px auto}
@keyframes spin{to{transform:rotate(360deg)}}
a{color:var(--gold);text-decoration:none}
.lang-toggle { font-size: 11px; letter-spacing: 0.1em; color: var(--text-dim, #888880); cursor: pointer; display: flex; gap: 6px; align-items: center; }
.lang-toggle span.active { color: var(--gold, #C9A84C); }
</style>
</head>
<body>
<div class="card">
  <div style="display:flex;justify-content:flex-end;margin-bottom:16px">
    <div class="lang-toggle" id="lang-toggle">
      <span data-lang="nl" class="active">NL</span>
      <span style="opacity:0.3">|</span>
      <span data-lang="en">EN</span>
    </div>
  </div>
  <div class="mark">HCI</div>
  <h1 data-nl="E-mail bevestigen..." data-en="Confirming your email...">Confirming your email...</h1>
  <p data-nl="Even geduld terwijl we uw account verifiëren." data-en="Please wait while we verify your account.">Please wait while we verify your account.</p>
  <div class="spinner"></div>
  <p style="font-size:12px" data-nl="Als er niets gebeurt, <a href='/modules'>keer terug naar het platform</a>." data-en="If nothing happens, <a href='/modules'>return to the platform</a>.">If nothing happens, <a href="/modules">return to the platform</a>.</p>
</div>
<script>
if(window.netlifyIdentity){
  window.netlifyIdentity.on('init',function(user){
    if(!user){window.netlifyIdentity.open('signup');}
  });
  window.netlifyIdentity.on('login',function(){
    window.location.href='/modules';
  });
}
</script>
<script src="/js/lang-toggle.js"></script>
</body>
</html>
