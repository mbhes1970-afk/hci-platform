<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>De HCI Methodologie | HES Consultancy International</title>
<meta name="description" content="Vier fasen, bewezen bij tech-bedrijven in Benelux en DACH. Van product-markt combinatie tot eerste klant.">
<meta property="og:title" content="De HCI Methodologie">
<meta property="og:description" content="Vier fasen. Van product-markt fit tot eerste klant. Bewezen bij tech-bedrijven in Benelux en DACH.">
<meta property="og:image" content="/Color_logo_-_no_background.png">
<meta property="og:type" content="website">
<meta property="og:locale" content="nl_NL">
<link rel="icon" type="image/png" href="/Color_logo_-_no_background.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Outfit:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="/site.config.js"></script>
<script src="/hci-intelligence-core.js"></script>
<style>
:root {
  --gold: #c8a55a;
  --gold-light: #e0c882;
  --gold-dim: rgba(200,165,90,.12);
  --gold-border: rgba(200,165,90,.25);
  --bg-deep: #08090c;
  --bg: #0d0f14;
  --bg-card: #13151c;
  --bg-elevated: #1c1e28;
  --border: rgba(255,255,255,.06);
  --border-hover: rgba(255,255,255,.12);
  --text: #a8a6b4;
  --text-dim: #5e5d6a;
  --text-bright: #f0eef5;
  --white: #ffffff;
  --success: #4ade80;
  --accent: #6C5CE7;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Outfit', sans-serif;
  background: var(--bg-deep);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  line-height: 1.7;
  overflow-x: hidden;
}

.ambient {
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background:
    radial-gradient(ellipse 900px 700px at 15% 25%, rgba(200,165,90,.04) 0%, transparent 70%),
    radial-gradient(ellipse 700px 900px at 85% 75%, rgba(108,92,231,.03) 0%, transparent 70%);
}
.grain {
  position: fixed; inset: 0; pointer-events: none; z-index: 999; opacity: .02;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='g'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.75' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23g)'/%3E%3C/svg%3E");
}

.container { max-width: 1200px; margin: 0 auto; padding: 0 40px; position: relative; z-index: 10; }
section { padding: 100px 0; position: relative; }

.section-eyebrow {
  font-family: 'Geist Mono', monospace;
  font-size: 11px; color: var(--text-dim);
  text-transform: uppercase; letter-spacing: 2px; margin-bottom: 16px;
}
.section-title {
  font-family: 'Instrument Serif', serif;
  font-size: clamp(28px, 4vw, 48px);
  font-weight: 400; color: var(--white);
  line-height: 1.15; margin-bottom: 16px;
}
.section-title em { font-style: italic; color: var(--gold); }
.section-sub {
  font-size: 16px; color: var(--text);
  line-height: 1.8; max-width: 600px; margin-bottom: 56px;
}

.btn-primary {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 14px 32px; border-radius: 8px;
  font-size: 14px; font-weight: 600; text-decoration: none;
  background: linear-gradient(135deg, var(--gold), #d4b45e);
  color: var(--bg-deep); transition: all .3s; letter-spacing: .3px;
}
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(200,165,90,.25); }
.btn-ghost {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 14px 28px; border-radius: 8px;
  font-size: 14px; font-weight: 500; text-decoration: none;
  color: var(--text); border: 1px solid var(--border); transition: all .2s;
}
.btn-ghost:hover { border-color: var(--gold-border); color: var(--gold); }

/* ═══ HERO ═══ */
.hero { padding: 140px 0 80px; max-width: 780px; }
.hero h1 {
  font-family: 'Instrument Serif', serif;
  font-size: clamp(36px, 5.5vw, 64px);
  font-weight: 400; line-height: 1.1;
  color: var(--white); margin-bottom: 24px;
}
.hero h1 em {
  font-style: italic;
  background: linear-gradient(135deg, var(--gold), var(--gold-light));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.hero-sub { font-size: 17px; color: var(--text); line-height: 1.8; max-width: 580px; }

/* ═══ WAAROM ANDERS ═══ */
.why-section { border-top: 1px solid var(--border); }
.why-text { font-size: 16px; color: var(--text); line-height: 1.9; max-width: 640px; margin-bottom: 48px; }
.compare-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0; max-width: 700px; }
.compare-col { padding: 0; }
.compare-header {
  font-family: 'Geist Mono', monospace;
  font-size: 11px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 1.5px; padding: 12px 0; margin-bottom: 16px;
  border-bottom: 1px solid var(--border);
}
.compare-header.old { color: var(--text-dim); }
.compare-header.new { color: var(--gold); }
.compare-row {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 0; font-size: 14px;
}
.compare-row.old { color: var(--text-dim); }
.compare-row.new { color: var(--text-bright); }
.compare-arrow { color: var(--gold); font-size: 16px; position: absolute; left: 50%; transform: translateX(-50%); }
.compare-wrapper { position: relative; }

/* ═══ PHASES ═══ */
.phases-section { border-top: 1px solid var(--border); }
.phases-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 2px; overflow: hidden; }
.phase-card {
  background: var(--bg-card); padding: 40px 28px;
  position: relative; transition: all .3s;
}
.phase-card:first-child { border-radius: 16px 0 0 16px; }
.phase-card:last-child { border-radius: 0 16px 16px 0; }
.phase-card:hover { background: var(--bg-elevated); }
.phase-num {
  font-family: 'Instrument Serif', serif;
  font-size: 48px; color: var(--gold); opacity: .3;
  line-height: 1; margin-bottom: 16px;
}
.phase-title {
  font-family: 'Instrument Serif', serif;
  font-size: 24px; font-weight: 400;
  color: var(--white); margin-bottom: 4px;
}
.phase-subtitle {
  font-family: 'Geist Mono', monospace;
  font-size: 10px; color: var(--text-dim); text-transform: uppercase;
  letter-spacing: 1px; margin-bottom: 16px;
}
.phase-desc { font-size: 14px; color: var(--text); line-height: 1.8; }
.phase-connector {
  position: absolute; right: -8px; top: 50%; transform: translateY(-50%);
  width: 16px; height: 16px;
  background: var(--bg-deep); border: 2px solid var(--border);
  border-radius: 50%; z-index: 2;
  display: flex; align-items: center; justify-content: center;
}
.phase-connector::after { content: '\2192'; font-size: 8px; color: var(--text-dim); }

/* ═══ PARTNER MODULES ═══ */
.partner-section { border-top: 1px solid var(--border); }
.partner-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 32px; }
.partner-card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 12px; padding: 36px 28px; text-align: center;
  transition: all .3s;
}
.partner-card:hover { border-color: var(--gold-border); }
.partner-name {
  font-family: 'Instrument Serif', serif;
  font-size: 28px; color: var(--gold); margin-bottom: 12px;
}
.partner-desc { font-size: 14px; color: var(--text); }
.partner-note { font-size: 14px; color: var(--text-dim); text-align: center; font-style: italic; }

/* ═══ TOOLS ═══ */
.tools-section { border-top: 1px solid var(--border); }
.tools-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; }
.tool-card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 10px; padding: 24px 20px;
  text-decoration: none; color: inherit; transition: all .3s;
  display: flex; flex-direction: column; gap: 8px;
}
.tool-card:hover { border-color: var(--gold-border); transform: translateY(-2px); }
.tool-name { font-size: 15px; font-weight: 600; color: var(--white); }
.tool-arrow { font-size: 12px; color: var(--gold); margin-top: auto; }

/* ═══ CTA ═══ */
.cta-section { border-top: 1px solid var(--border); text-align: center; }
.cta-title {
  font-family: 'Instrument Serif', serif;
  font-size: clamp(28px, 4vw, 42px); font-weight: 400;
  color: var(--white); margin-bottom: 24px;
}

/* ═══ FOOTER ═══ */
footer { padding: 40px 0; border-top: 1px solid var(--border); }
.footer-inner { display: flex; justify-content: space-between; align-items: center; }
.footer-left { display: flex; flex-direction: column; gap: 4px; }
.footer-tagline { font-family: 'Instrument Serif', serif; font-size: 14px; color: var(--gold); font-style: italic; }
.footer-brand { font-size: 12px; font-weight: 500; color: var(--text-dim); letter-spacing: .3px; }
.footer-center { display: flex; gap: 20px; }
.footer-icp-links a { font-size: 12px; color: var(--text-dim); text-decoration: none; transition: color .2s; margin: 0 10px; }
.footer-icp-links a:hover { color: var(--text); }
.footer-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
.footer-links { display: flex; gap: 16px; }
.footer-links a { font-size: 12px; color: var(--text-dim); text-decoration: none; transition: color .2s; }
.footer-links a:hover { color: var(--text); }
.footer-copyright { font-size: 11px; color: var(--text-dim); margin-top: 4px; }

/* ═══ ANIMATIONS ═══ */
.fade-up { opacity: 0; transform: translateY(24px); transition: opacity .6s ease, transform .6s ease; }
.fade-up.visible { opacity: 1; transform: translateY(0); }
.stagger-1 { transition-delay: .1s; }
.stagger-2 { transition-delay: .2s; }
.stagger-3 { transition-delay: .3s; }

/* ═══ MOBILE ═══ */
@media (max-width: 900px) {
  .container { padding: 0 20px; }
  .hero { padding: 100px 0 60px; }
  .compare-grid { grid-template-columns: 1fr; gap: 32px; }
  .phases-grid { grid-template-columns: 1fr 1fr; gap: 2px; }
  .phase-card:first-child { border-radius: 16px 0 0 0; }
  .phase-card:nth-child(2) { border-radius: 0 16px 0 0; }
  .phase-card:nth-child(3) { border-radius: 0 0 0 16px; }
  .phase-card:last-child { border-radius: 0 0 16px 0; }
  .phase-connector { display: none; }
  .partner-grid { grid-template-columns: 1fr; }
  .footer-inner { flex-direction: column; gap: 16px; text-align: center; }
  .footer-right { align-items: center; }
}
@media (max-width: 600px) {
  .phases-grid { grid-template-columns: 1fr; }
  .phase-card { border-radius: 0 !important; }
  .phase-card:first-child { border-radius: 16px 16px 0 0 !important; }
  .phase-card:last-child { border-radius: 0 0 16px 16px !important; }
}
</style>
</head>
<body>

<div class="ambient"></div>
<div class="grain"></div>

<!-- Navigation -->
<div id="hci-nav"></div>
<script src="/_nav.js"></script>

<!-- S1 HERO -->
<section class="hero">
  <div class="container">
    <h1 class="fade-up" id="hero-title"></h1>
    <p class="hero-sub fade-up" id="hero-sub"></p>
  </div>
</section>

<!-- S2 WAAROM ANDERS -->
<section class="why-section">
  <div class="container">
    <h2 class="section-title fade-up" id="why-title"></h2>
    <div class="why-text fade-up" id="why-text"></div>
    <div class="compare-wrapper fade-up">
      <div class="compare-grid" id="compare-grid"></div>
    </div>
  </div>
</section>

<!-- S3 DE 4 FASEN -->
<section class="phases-section">
  <div class="container">
    <div class="section-eyebrow fade-up" id="phases-eyebrow"></div>
    <h2 class="section-title fade-up" id="phases-title"></h2>
    <p class="section-sub fade-up" id="phases-sub"></p>
    <div class="phases-grid fade-up" id="phases-grid"></div>
  </div>
</section>

<!-- S4 PARTNER ENABLEMENT -->
<section class="partner-section">
  <div class="container">
    <div class="section-eyebrow fade-up" id="partner-eyebrow"></div>
    <h2 class="section-title fade-up" id="partner-title"></h2>
    <div class="partner-grid" id="partner-grid"></div>
    <div class="partner-note fade-up" id="partner-note"></div>
  </div>
</section>

<!-- S5 TOOLS -->
<section class="tools-section">
  <div class="container">
    <div class="section-eyebrow fade-up" id="tools-eyebrow"></div>
    <h2 class="section-title fade-up" id="tools-title"></h2>
    <p class="section-sub fade-up" id="tools-sub"></p>
    <div class="tools-grid" id="tools-grid"></div>
  </div>
</section>

<!-- S6 CTA -->
<section class="cta-section">
  <div class="container">
    <h2 class="cta-title fade-up" id="cta-title"></h2>
    <div class="fade-up" id="cta-actions"></div>
  </div>
</section>

<!-- Footer -->
<div id="hci-footer"></div>
<script src="/_footer.js"></script>

<!-- Intelligence -->
<script src="/_intelligence.js"></script>

<script>
(function() {
  var S = window.SITE;
  if (!S) return;

  function l() { return localStorage.getItem('hci_lang') || 'nl'; }
  function tx(obj, key) { return obj[key + '_' + l()] || obj[key + '_nl'] || ''; }

  function renderPage() {
    var lang = l();
    var meth = S.methodology;
    var brand = S.brand;
    var isEn = lang === 'en';

    // Hero
    document.getElementById('hero-title').innerHTML = isEn
      ? 'The HCI <em>Methodology</em>'
      : 'De HCI <em>Methodologie</em>';
    document.getElementById('hero-sub').textContent = tx(meth, 'intro');

    // Waarom anders
    document.getElementById('why-title').innerHTML = isEn
      ? 'Traditional outreach <em>no longer works.</em>'
      : 'Traditionele outreach <em>werkt niet meer.</em>';

    document.getElementById('why-text').innerHTML = isEn
      ? 'Cold outreach has a 2% conversion rate. People don\'t read emails, don\'t answer the phone. That is not a temporary problem, it is structural.<br><br>HCI is built for the other 98%.'
      : 'Koude acquisitie heeft een conversieratio van 2%. Mensen lezen geen mails, pakken de telefoon niet op. Dat is geen tijdelijk probleem, het is structureel.<br><br>HCI is gebouwd voor de andere 98%.';

    var compareData = isEn ? [
      ['Cold outreach', 'Self-qualifying leads'],
      ['2% conversion', 'Only warm conversations'],
      ['Generic pitch', 'Sector-specific approach'],
      ['Loose tools', 'Integrated methodology'],
    ] : [
      ['Koude acquisitie', 'Zelf-kwalificerende leads'],
      ['2% conversie', 'Alleen warme gesprekken'],
      ['Generieke pitch', 'Sector-specifieke aanpak'],
      ['Losse tools', 'Ge\u00EFntegreerde methodologie'],
    ];

    var colOldHeader = isEn ? 'Traditional' : 'Traditioneel';
    var colNewHeader = isEn ? 'HCI Model' : 'HCI Model';

    document.getElementById('compare-grid').innerHTML =
      '<div class="compare-col">' +
        '<div class="compare-header old">' + colOldHeader + '</div>' +
        compareData.map(function(row) {
          return '<div class="compare-row old">' + row[0] + '</div>';
        }).join('') +
      '</div>' +
      '<div class="compare-col">' +
        '<div class="compare-header new">' + colNewHeader + '</div>' +
        compareData.map(function(row) {
          return '<div class="compare-row new">\u2192 ' + row[1] + '</div>';
        }).join('') +
      '</div>';

    // Phases
    document.getElementById('phases-eyebrow').textContent = isEn ? 'The 4 Phases' : 'De 4 Fasen';
    document.getElementById('phases-title').innerHTML = isEn
      ? 'From product-market fit to <em>first customer.</em>'
      : 'Van product-markt fit naar <em>eerste klant.</em>';
    document.getElementById('phases-sub').textContent = tx(meth, 'intro');

    document.getElementById('phases-grid').innerHTML = meth.phases.map(function(phase, i) {
      var connector = i < meth.phases.length - 1 ? '<div class="phase-connector"></div>' : '';
      return '<div class="phase-card">' +
        '<div class="phase-num">' + phase.num + '</div>' +
        '<div class="phase-title">' + phase.title + '</div>' +
        '<div class="phase-subtitle">' + tx(phase, 'subtitle') + '</div>' +
        '<div class="phase-desc">' + tx(phase, 'desc') + '</div>' +
        connector +
      '</div>';
    }).join('');

    // Partner Enablement
    var pm = meth.partner_modules;
    document.getElementById('partner-eyebrow').textContent = isEn ? 'Partner Enablement' : 'Partner Enablement';
    document.getElementById('partner-title').innerHTML = tx(pm, 'title');

    document.getElementById('partner-grid').innerHTML = pm.modules.map(function(mod, i) {
      return '<div class="partner-card fade-up stagger-' + (i+1) + '">' +
        '<div class="partner-name">' + mod.name + '</div>' +
        '<div class="partner-desc">' + tx(mod, 'desc') + '</div>' +
      '</div>';
    }).join('');

    document.getElementById('partner-note').textContent = isEn
      ? 'Deployed at Chunk Works, Protinus IT, IT2Growth and other partners.'
      : 'Ingezet bij Chunk Works, Protinus IT, IT2Growth en andere partners.';

    // Tools
    document.getElementById('tools-eyebrow').textContent = 'Tools';
    document.getElementById('tools-title').innerHTML = isEn
      ? 'Tools that support the <em>methodology.</em>'
      : 'Tools die de methodologie <em>ondersteunen.</em>';
    document.getElementById('tools-sub').textContent = '';

    var tools = [
      { name: 'GTM Calculator', href: '/calculator.html' },
      { name: 'EU Readiness Quick Scan', href: '/hci-quickscan.html' },
      { name: 'DealFlow Platform', href: S.tools.dealflow },
      { name: 'CMO-FMO Generator', href: '/hci-cmofmo.html' },
      { name: 'HCI Assessment', href: S.tools.assessment },
    ];

    document.getElementById('tools-grid').innerHTML = tools.map(function(tool, i) {
      return '<a href="' + tool.href + '" class="tool-card fade-up stagger-' + ((i % 3) + 1) + '">' +
        '<div class="tool-name">' + tool.name + '</div>' +
        '<div class="tool-arrow">\u2192</div>' +
      '</a>';
    }).join('');

    // CTA
    document.getElementById('cta-title').textContent = isEn
      ? 'Ready to apply the methodology?'
      : 'Klaar om de methodologie toe te passen?';
    document.getElementById('cta-actions').innerHTML =
      '<a href="' + brand.calendly + '" class="btn-primary">' + (isEn ? 'Schedule a call' : 'Plan een gesprek') + '</a>';

    initObserver();
  }

  function initObserver() {
    var els = document.querySelectorAll('.fade-up:not(.visible)');
    if (!('IntersectionObserver' in window)) {
      els.forEach(function(el) { el.classList.add('visible'); });
      return;
    }
    var observer = new IntersectionObserver(function(entries) {
      entries.forEach(function(entry) {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
          observer.unobserve(entry.target);
        }
      });
    }, { threshold: 0.1 });
    els.forEach(function(el) { observer.observe(el); });
  }

  var _prevLangChange = window.onLangChange;
  window.onLangChange = function() {
    renderPage();
    if (typeof _prevLangChange === 'function') _prevLangChange();
  };

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', renderPage);
  } else {
    renderPage();
  }
})();
</script>

</body>
</html>
