<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="ipinfo-token" content="346441b021b8f4">
<meta name="slack-webhook" content="SLACK_WEBHOOK_PLACEHOLDER">
<title>Compliance — HES Consultancy International</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Outfit:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="site.config.js"></script>
<script src="hci-intelligence-core.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg-deep:#08090c;--bg:#0d0f14;--bg-card:#13151c;--bg-elevated:#1c1e28;
  --gold:#c8a55a;--gold-light:#e0c882;--gold-dim:rgba(200,165,90,.12);--gold-border:rgba(200,165,90,.25);
  --icp3-accent:#1e3a5f;
  --text:#a8a6b4;--text-dim:#5e5d6a;--text-bright:#f0eef5;--white:#ffffff;
  --border:rgba(255,255,255,.06);--border-hover:rgba(255,255,255,.12);
  --font-display:'Instrument Serif',serif;
  --font-body:'Outfit',sans-serif;
  --font-mono:'Geist Mono',monospace;
}
html{scroll-behavior:smooth}
body{background:var(--bg-deep);color:var(--text);font-family:var(--font-body);font-weight:400;line-height:1.6;overflow-x:hidden;min-height:100vh}

/* Ambient background */
body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(30,58,95,.15),transparent 70%),radial-gradient(ellipse 60% 40% at 80% 20%,rgba(200,165,90,.04),transparent 60%);pointer-events:none;z-index:0}

/* Grain overlay */
body::after{content:'';position:fixed;top:0;left:0;width:100%;height:100%;opacity:.035;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");pointer-events:none;z-index:0}

.container{max-width:1200px;margin:0 auto;padding:0 40px;position:relative;z-index:1}
section{padding:120px 0;position:relative;z-index:1}

/* Typography */
h1{font-family:var(--font-display);font-weight:400;font-size:clamp(2.4rem,5vw,3.8rem);line-height:1.15;color:var(--white);letter-spacing:-0.02em}
h1 em{font-style:italic;background:linear-gradient(135deg,var(--gold),var(--gold-light));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
h2{font-family:var(--font-display);font-weight:400;font-size:clamp(1.8rem,3.5vw,2.6rem);color:var(--white);line-height:1.2;letter-spacing:-0.01em}
h2 em{font-style:italic;background:linear-gradient(135deg,var(--gold),var(--gold-light));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
h3{font-family:var(--font-body);font-weight:600;font-size:1.15rem;color:var(--text-bright);margin-bottom:8px}

/* Buttons */
.btn-primary{display:inline-flex;align-items:center;gap:8px;padding:14px 32px;background:linear-gradient(135deg,var(--gold),var(--gold-light));color:#0d0f14;font-family:var(--font-body);font-weight:600;font-size:.95rem;border:none;border-radius:8px;cursor:pointer;text-decoration:none;transition:all .3s ease;box-shadow:0 4px 20px rgba(200,165,90,.2)}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(200,165,90,.35)}
.btn-ghost{display:inline-flex;align-items:center;gap:8px;padding:14px 32px;background:transparent;color:var(--text-bright);font-family:var(--font-body);font-weight:500;font-size:.95rem;border:1px solid var(--border-hover);border-radius:8px;cursor:pointer;text-decoration:none;transition:all .3s ease}
.btn-ghost:hover{border-color:var(--gold-border);color:var(--gold)}

/* Fade-up animation */
.fade-up{opacity:0;transform:translateY(30px);transition:opacity .7s ease,transform .7s ease}
.fade-up.visible{opacity:1;transform:translateY(0)}

/* Eyebrow / kicker */
.eyebrow{font-family:var(--font-mono);font-size:.8rem;font-weight:500;text-transform:uppercase;letter-spacing:.12em;color:var(--gold);margin-bottom:16px}

/* ── HERO ────────────────────────────────── */
.hero{padding:160px 0 120px;text-align:center}
.hero-sub{max-width:640px;margin:20px auto 0;font-size:1.1rem;color:var(--text);line-height:1.7}
.hero-stats{display:flex;justify-content:center;gap:48px;margin:48px 0}
.hero-stat-num{font-family:var(--font-display);font-size:2.4rem;color:var(--gold);line-height:1}
.hero-stat-label{font-size:.85rem;color:var(--text-dim);margin-top:4px;white-space:pre-line}
.hero-ctas{display:flex;justify-content:center;gap:16px;margin-top:48px;flex-wrap:wrap}

/* ── SECTOR GRID ─────────────────────────── */
.sector-section{background:var(--bg)}
.sector-header{text-align:center;margin-bottom:64px}
.sector-header p{max-width:560px;margin:16px auto 0;color:var(--text)}
.sector-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px}
.sector-card{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:32px;transition:all .4s ease;border-top:3px solid transparent;position:relative;overflow:hidden}
.sector-card:hover{border-color:var(--border-hover);transform:translateY(-4px);box-shadow:0 12px 40px rgba(0,0,0,.3)}
.sector-card.highlighted{border-color:var(--gold-border);box-shadow:0 0 30px rgba(200,165,90,.1)}
.sector-card-icon{font-size:2.2rem;margin-bottom:16px;display:block}
.sector-card-name{font-family:var(--font-body);font-weight:600;font-size:1.15rem;color:var(--white);margin-bottom:4px}
.sector-card-sub{font-size:.85rem;color:var(--text-dim);margin-bottom:16px}
.sector-card-frameworks{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
.sector-card-pill{font-family:var(--font-mono);font-size:.7rem;font-weight:500;padding:4px 10px;border-radius:20px;letter-spacing:.04em}
.sector-card-pains{list-style:none;margin-bottom:20px}
.sector-card-pains li{font-size:.88rem;color:var(--text);padding:4px 0 4px 18px;position:relative}
.sector-card-pains li::before{content:'';position:absolute;left:0;top:11px;width:6px;height:6px;border-radius:50%;background:var(--gold-border)}
.sector-card-cta{font-family:var(--font-body);font-weight:500;font-size:.88rem;color:var(--gold);text-decoration:none;transition:color .2s}
.sector-card-cta:hover{color:var(--gold-light)}

/* ── HOW IT WORKS ────────────────────────── */
.how-section{background:var(--bg-deep)}
.how-header{text-align:center;margin-bottom:64px}
.how-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:32px}
.how-step{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:36px;text-align:center;position:relative}
.how-step-num{font-family:var(--font-mono);font-size:.85rem;color:var(--gold);margin-bottom:12px;display:block}
.how-step-title{font-family:var(--font-body);font-weight:600;font-size:1.1rem;color:var(--white);margin-bottom:10px}
.how-step-desc{font-size:.92rem;color:var(--text);line-height:1.6}

/* ── MIKE SECTION ────────────────────────── */
.mike-section{background:var(--bg)}
.mike-wrap{display:grid;grid-template-columns:auto 1fr;gap:48px;align-items:center}
.mike-photo{width:200px;height:200px;border-radius:50%;object-fit:cover;border:3px solid var(--gold-border);box-shadow:0 8px 30px rgba(0,0,0,.4)}
.mike-name{font-family:var(--font-display);font-size:1.8rem;color:var(--white);margin-bottom:4px}
.mike-title{font-family:var(--font-mono);font-size:.82rem;color:var(--gold);margin-bottom:8px}
.mike-years{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.mike-years-num{font-family:var(--font-display);font-size:2rem;color:var(--gold);line-height:1}
.mike-years-label{font-size:.82rem;color:var(--text-dim);white-space:pre-line}
.mike-bio{font-size:1rem;color:var(--text);line-height:1.7;margin-bottom:28px;max-width:560px}

/* ── BOTTOM CTA ──────────────────────────── */
.bottom-cta{text-align:center;background:var(--bg-deep)}
.bottom-cta-box{background:linear-gradient(135deg,rgba(30,58,95,.2),rgba(200,165,90,.06));border:1px solid var(--gold-border);border-radius:16px;padding:64px 48px}
.bottom-cta-box h2{margin-bottom:16px}
.bottom-cta-box p{color:var(--text);max-width:480px;margin:0 auto 32px}

/* ── RESPONSIVE ──────────────────────────── */
@media(max-width:900px){
  .sector-grid{grid-template-columns:repeat(2,1fr)}
  .how-grid{grid-template-columns:1fr}
  .mike-wrap{grid-template-columns:1fr;text-align:center;justify-items:center}
  .mike-bio{margin-left:auto;margin-right:auto}
  section{padding:80px 0}
  .hero{padding:120px 0 80px}
}
@media(max-width:600px){
  .container{padding:0 20px}
  .sector-grid{grid-template-columns:1fr}
  .hero-stats{flex-direction:column;gap:24px;align-items:center}
  .hero-ctas{flex-direction:column;align-items:center}
  .bottom-cta-box{padding:40px 24px}
  .mike-photo{width:150px;height:150px}
}
</style>
</head>
<body>

<div id="hci-nav"></div>
<script src="/_nav.js"></script>

<!-- Hero -->
<section class="hero" id="hero">
  <div class="container" id="hero-content"></div>
</section>

<!-- Sector grid -->
<section class="sector-section" id="sectoren">
  <div class="container">
    <div class="sector-header fade-up" id="sector-header"></div>
    <div class="sector-grid hci-stagger" id="sector-grid"></div>
  </div>
</section>

<!-- How it works -->
<section class="how-section" id="hoe-het-werkt">
  <div class="container">
    <div class="how-header fade-up" id="how-header"></div>
    <div class="how-grid" id="how-grid"></div>
  </div>
</section>

<!-- Mike Hes -->
<section class="mike-section" id="mike">
  <div class="container">
    <div class="mike-wrap fade-up" id="mike-content"></div>
  </div>
</section>

<!-- Bottom CTA -->
<section class="bottom-cta" id="bottom-cta">
  <div class="container">
    <div class="bottom-cta-box fade-up" id="bottom-cta-content"></div>
  </div>
</section>

<div id="hci-footer"></div>
<script src="/_footer.js"></script>

<script>
(function(){
  var S = window.SITE;
  var icp = S.icps.icp3;
  var sectors = S.sectors;
  var mike = S.mike;
  var brand = S.brand;

  function renderPage(){
    var lang = getLang();
    var l = lang === 'en' ? 'en' : 'nl';

    // ── Hero ──
    document.getElementById('hero-content').innerHTML =
      '<div class="eyebrow fade-up">' + tk(icp,'kicker') + '</div>' +
      '<h1 class="fade-up">' + tk(icp,'hero_h1') + '</h1>' +
      '<p class="hero-sub fade-up">' + tk(icp,'hero_sub') + '</p>' +
      '<div class="hero-stats fade-up">' +
        icp.hero_stats.map(function(st){
          return '<div class="hero-stat"><div class="hero-stat-num">' + st.num + '</div>' +
                 '<div class="hero-stat-label">' + tk(st,'label') + '</div></div>';
        }).join('') +
      '</div>' +
      '<div class="hero-ctas fade-up">' +
        '<a href="' + icp.cta_href + '" class="btn-primary">' + tk(icp,'cta') + '</a>' +
        '<a href="' + icp.secondary_href + '" class="btn-ghost">' + tk(icp,'secondary') + '</a>' +
      '</div>';

    // ── Sector header ──
    document.getElementById('sector-header').innerHTML =
      '<div class="eyebrow">' + t('Sectoren','Sectors') + '</div>' +
      '<h2>' + t('Compliance per <em>sector</em>','Compliance per <em>sector</em>') + '</h2>' +
      '<p>' + t('Elke sector heeft unieke regelgeving. Kies uw sector voor een gerichte aanpak.','Every sector has unique regulations. Choose your sector for a targeted approach.') + '</p>';

    // ── Sector cards (dynamic from SITE.sectors[]) ──
    var gridEl = document.getElementById('sector-grid');
    gridEl.innerHTML = sectors.map(function(sec){
      var pains = (sec['pain_' + l] || sec.pain_nl).slice(0,2);
      var pills = sec.frameworks.map(function(fw){
        return '<span class="sector-card-pill" style="background:' + sec.accent + '18;color:' + sec.accent + '">' + fw + '</span>';
      }).join('');
      var painItems = pains.map(function(p){
        return '<li>' + p + '</li>';
      }).join('');
      return '<div class="sector-card fade-up" data-sector="' + sec.id + '">' +
        '<span class="sector-card-icon">' + sec.icon + '</span>' +
        '<div class="sector-card-name">' + tk(sec,'label') + '</div>' +
        '<div class="sector-card-sub">' + tk(sec,'sub') + '</div>' +
        '<div class="sector-card-frameworks">' + pills + '</div>' +
        '<ul class="sector-card-pains">' + painItems + '</ul>' +
        '<a href="' + sec.cta_href + '" class="sector-card-cta">' + t('Start quickscan →','Start quickscan →') + '</a>' +
      '</div>';
    }).join('');

    // ── How it works ──
    var steps = icp['how_it_works_' + l] || icp.how_it_works_nl;
    document.getElementById('how-header').innerHTML =
      '<div class="eyebrow">' + t('Hoe het werkt','How it works') + '</div>' +
      '<h2>' + t('Drie stappen naar <em>compliance</em>','Three steps to <em>compliance</em>') + '</h2>';

    document.getElementById('how-grid').innerHTML = steps.map(function(step){
      return '<div class="how-step fade-up">' +
        '<span class="how-step-num">' + step.num + '</span>' +
        '<div class="how-step-title">' + step.title + '</div>' +
        '<div class="how-step-desc">' + step.desc + '</div>' +
      '</div>';
    }).join('');

    // ── Mike ──
    document.getElementById('mike-content').innerHTML =
      '<img class="mike-photo" src="' + brand.mike_photo + '" alt="' + mike.name + '">' +
      '<div>' +
        '<div class="mike-name">' + mike.name + '</div>' +
        '<div class="mike-title">' + tk(mike,'title') + '</div>' +
        '<div class="mike-years">' +
          '<span class="mike-years-num">' + mike.years + '</span>' +
          '<span class="mike-years-label">' + tk(mike,'years_label') + '</span>' +
        '</div>' +
        '<p class="mike-bio">' + tk(mike,'bio') + '</p>' +
        '<a href="' + brand.calendly + '" class="btn-primary">' + tk(mike,'cta') + '</a>' +
      '</div>';

    // ── Bottom CTA ──
    document.getElementById('bottom-cta-content').innerHTML =
      '<h2>' + t('Klaar om te starten?','Ready to start?') + '</h2>' +
      '<p>' + t('Doe de gratis quickscan en ontdek in 7 minuten waar uw organisatie staat.','Take the free quickscan and discover in 7 minutes where your organisation stands.') + '</p>' +
      '<a href="' + icp.cta_href + '" class="btn-primary">' + tk(icp,'cta') + '</a>';

    // ── Re-observe fade-ups ──
    initFadeUp();

    // ── URL param sector highlight ──
    highlightSector();
  }

  function highlightSector(){
    var params = new URLSearchParams(window.location.search);
    var sid = params.get('sector');
    if(!sid) return;
    var card = document.querySelector('.sector-card[data-sector="' + sid + '"]');
    if(!card) return;
    // Remove previous highlights
    document.querySelectorAll('.sector-card.highlighted').forEach(function(c){c.classList.remove('highlighted')});
    card.classList.add('highlighted');
    card.style.borderTopColor = card.querySelector('.sector-card-pill') ?
      window.getComputedStyle(card.querySelector('.sector-card-pill')).color : 'var(--gold)';
    setTimeout(function(){
      card.scrollIntoView({behavior:'smooth',block:'center'});
    },300);
  }

  // Hover: show border-top color from sector.color
  document.addEventListener('mouseover',function(e){
    var card = e.target.closest('.sector-card');
    if(!card) return;
    var sid = card.getAttribute('data-sector');
    var sec = sectors.find(function(s){return s.id === sid});
    if(sec) card.style.borderTopColor = sec.color;
  });
  document.addEventListener('mouseout',function(e){
    var card = e.target.closest('.sector-card');
    if(!card) return;
    if(!card.classList.contains('highlighted')) card.style.borderTopColor = 'transparent';
  });

  // Intelligence event listener
  document.addEventListener('hci:icp-detected',function(e){
    var detail = e.detail || {};
    if(detail.sector){
      document.querySelectorAll('.sector-card.highlighted').forEach(function(c){
        c.classList.remove('highlighted');
        c.style.borderTopColor = 'transparent';
      });
      var card = document.querySelector('.sector-card[data-sector="' + detail.sector + '"]');
      if(card){
        card.classList.add('highlighted');
        var sec = sectors.find(function(s){return s.id === detail.sector});
        if(sec) card.style.borderTopColor = sec.color;
      }
    }
  });

  // IntersectionObserver for fade-up
  function initFadeUp(){
    var els = document.querySelectorAll('.fade-up:not(.visible)');
    if(!els.length) return;
    var observer = new IntersectionObserver(function(entries){
      entries.forEach(function(entry){
        if(entry.isIntersecting){
          entry.target.classList.add('visible');
          observer.unobserve(entry.target);
        }
      });
    },{threshold:0.1,rootMargin:'0px 0px -40px 0px'});
    els.forEach(function(el){observer.observe(el)});
  }

  window.onLangChange = renderPage;

  document.addEventListener('DOMContentLoaded',function(){
    renderPage();
  });

  // If DOM already loaded
  if(document.readyState !== 'loading') renderPage();
})();
</script>
<script src="/js/lang-toggle.js"></script>
<script src="_intelligence.js"></script>
</body>
</html>
